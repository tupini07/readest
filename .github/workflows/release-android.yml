name: Release Android APK

on:
  workflow_dispatch:

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: generate version from timestamp
        id: version
        run: |
          YEAR=$(date -u +'%Y')
          MONTH=$(date -u +'%-m')
          DAY=$(date -u +'%-d')
          HOUR=$(date -u +'%-H')
          MIN=$(date -u +'%-M')
          VERSION="${YEAR}.$((MONTH * 100 + DAY)).$((HOUR * 100 + MIN))"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-android:
    needs: get-version
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: initialize git submodules
        run: git submodule update --init --recursive

      - name: setup pnpm
        uses: pnpm/action-setup@v4

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install NDK
        run: sdkmanager "ndk;28.2.13676358"

      - name: install dependencies
        run: pnpm install

      - name: copy pdfjs-dist and simplecc-dist to public directory
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: ubuntu-android-aarch64-cargo

      - name: cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/readest-app/src-tauri/gen/android/**/build.gradle.kts', 'apps/readest-app/src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/readest-app/.next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/readest-app/src/**') }}
          restore-keys: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: create .env.local file for Next.js
        run: |
          echo "NEXT_PUBLIC_APP_PLATFORM=tauri" >> .env.local
          cp .env.local apps/readest-app/.env.local

      - name: build Android APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/28.2.13676358
        run: |
          cd apps/readest-app/
          rm -rf src-tauri/gen/android
          pnpm tauri android init
          pnpm tauri icon ../../data/icons/readest-book.png
          git checkout .

          version=${{ needs.get-version.outputs.version }}

          # Update package.json version so the Android manifest versionName
          # matches the GitHub release tag instead of the hardcoded value.
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$version"

          pushd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties
          popd

          apk_path=src-tauri/gen/android/app/build/outputs/apk/universal/release
          arm64_apk=Readest_${version}_arm64.apk
          pnpm tauri android build --target aarch64
          cp ${apk_path}/app-universal-release.apk $arm64_apk

          echo "APK built: $arm64_apk"

      - name: create release and upload APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/readest-app/
          version=${{ needs.get-version.outputs.version }}
          arm64_apk=Readest_${version}_arm64.apk
          tag="v${version}"

          # Create release if it doesn't exist, otherwise upload to existing
          gh release create "$tag" --title "v${version}" --generate-notes --repo ${{ github.repository }} || true
          gh release upload "$tag" "$arm64_apk" --clobber --repo ${{ github.repository }}

      - name: delete previous releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_tag="v${{ needs.get-version.outputs.version }}"
          gh release list --limit 100 --json tagName -q '.[].tagName' --repo ${{ github.repository }} | while read -r tag; do
            if [ "$tag" != "$current_tag" ]; then
              echo "Deleting release $tag"
              gh release delete "$tag" --yes --cleanup-tag --repo ${{ github.repository }} 2>/dev/null || true
            fi
          done
